<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SolanaMap Demo</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
    }

    video {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: contain;
      cursor: pointer;
      transition: opacity 0.3s ease;
    }

    video:hover {
      opacity: 0.85;
    }

    .back-link {
      position: fixed;
      top: 16px;
      left: 20px;
      color: #aaa;
      text-decoration: none;
      font-family: sans-serif;
      font-size: 14px;
      z-index: 10;
      transition: color 0.2s;
    }

    .back-link:hover {
      color: #fff;
    }
  </style>
</head>
<body>
  <a href="index.html" class="back-link">← Back to Portfolio</a>
  <video src="img/projects/SolanaMap/solanamap-demo.mov" loop autoplay muted playsinline></video>
</body>
</html>
